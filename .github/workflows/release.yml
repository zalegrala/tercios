name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          set -euo pipefail
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi

          base="tercios_${{ matrix.goos }}_${{ matrix.goarch }}"
          out_dir="dist/${base}"
          mkdir -p "${out_dir}"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" -o "${out_dir}/tercios${ext}" ./cmd/tercios

      - name: Package artifact
        run: |
          set -euo pipefail
          base="tercios_${{ matrix.goos }}_${{ matrix.goarch }}"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${base}.zip" "${base}")
            echo "ASSET=dist/${base}.zip" >> "$GITHUB_ENV"
          else
            tar -C dist -czf "dist/${base}.tar.gz" "${base}"
            echo "ASSET=dist/${base}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}

  publish-release:
    needs: build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 tercios_* > checksums.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tercios_*.tar.gz
            dist/tercios_*.zip
            dist/checksums.txt
